# NOTE: device matching ([ids]) is managed by NixOS via
# services.keyd.keyboards.internal.ids — do not add an [ids] section here.

[main]
# Colemak layout
q = q
w = w
e = f
r = p
t = g
y = j
u = l
i = u
o = y
p = ;

a = a
s = r
d = s
f = t
g = d
h = h
j = n
k = e
l = i
; = o

z = z
x = x
c = c
v = v
b = b
n = k
m = m

# Caps: always escape
capslock = esc

# Left Alt: nav+symbols layer
leftalt = layer(nav)


[nav]
# Left hand: programming symbols (matching Moonlander arrows layer)
q = <
w = >
e = {
r = }
t = '
a = [
s = ]
d = (
f = )
g = "
z = \
x = |
c = +
v = =
b = -

# Right hand: navigation
i = up
j = left
k = down
l = right
y = pageup
h = pagedown
u = home
o = end

# Vim page movement
p = control, u
; = control, d

# Caps in nav layer: tap=esc, hold=leftalt (for Alt+Tab etc.)
capslock = overload(leftalt, esc)
